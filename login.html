<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - BodySlim</title>
    <!-- 📦 โหลด Lucide Icons ผ่าน CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-radius: 16px; 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-main: #F4F6F8;       
            --bg-card: #FFFFFF;       
            --text-main: #1A1D20;     
            --text-muted: #6C757D;    
            --border-color: #E9ECEF;  
            --accent-color: #1A1D20;  
            --accent-text: #FFFFFF;   
            --input-bg: #F4F6F8;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        [data-theme="dark"] {
            --bg-main: #111111;       
            --bg-card: #1E1E1E;       
            --text-main: #FAFAFA;     
            --text-muted: #A0A0A0;    
            --border-color: #2D2D2D;  
            --accent-color: #FAFAFA;  
            --accent-text: #111111;   
            --input-bg: #111111;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        html, body { border-radius: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            border-radius: 0 !important; 
        }
        
        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--accent-color);
            border-radius: 0;
        }

        .nav-links { display: flex; align-items: center; border-radius: 0; }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 0;
        }

        .nav-links a.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 4px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 0;
        }

        .hamburger-btn { display: none; background: transparent; border: 1px solid var(--border-color); padding: 8px; cursor: pointer; color: var(--text-main); }
        .mobile-dropdown { display: none; position: absolute; top: 70px; right: 20px; background: var(--bg-card); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; box-shadow: var(--card-shadow); z-index: 2000; flex-direction: column; gap: 12px; width: 220px; }
        .mobile-dropdown a, .mobile-dropdown button { color: var(--text-main); background: transparent; border: none; text-align: left; text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; cursor: pointer; width: 100%; }
        .mobile-dropdown a:hover, .mobile-dropdown button:hover { background-color: var(--bg-main); }

        .btn-auth {
            background-color: var(--accent-color);
            color: var(--accent-text);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px !important; 
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .nav-links { display: none !important; }
            .hamburger-btn { display: flex !important; }
            #dark-mode-toggle { display: none !important; }
            nav { padding: 12px 16px; }
        }
        @media (min-width: 769px) {
            #mobile-dark-mode-btn { display: none !important; }
        }

        .page-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px 20px;
            border-radius: 0 !important;
        }
        
        .auth-card {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--card-shadow);
            border-radius: 24px !important; 
        }
        
        h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
            border-radius: 0;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            font-size: 14px;
            outline: none;
            border-radius: 12px !important; 
        }
        
        input:focus {
            border-color: var(--accent-color);
            background-color: var(--bg-card);
        }
        
        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: var(--accent-text);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-weight: 600;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 12px !important; 
        }
        
        .btn-submit:hover { 
            opacity: 0.9; 
            transform: translateY(-1px);
        }
        
        .switch-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            border-radius: 0;
        }
        
        .switch-auth a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
        }
        .switch-auth a:hover {
            border-bottom: 1px solid var(--text-main);
        }

        /* 🌟 Custom Smooth Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 30px; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transform: scale(0.9) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 24px !important;
        }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
        .modal-icon-wrapper {
            width: 50px; height: 50px; background: rgba(220, 53, 69, 0.1);
            color: #dc3545; border-radius: 50% !important; display: flex;
            align-items: center; justify-content: center; margin: 0 auto 16px auto;
        }
        .modal-icon-wrapper.success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .modal-title { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; font-size: 13px; border-radius: 12px !important; }
        .btn-danger { background-color: #dc3545 !important; color: #ffffff !important; border-color: #dc3545 !important; }
        .btn-danger:hover { opacity: 0.85; }
        .btn-success { background-color: #10b981 !important; color: #ffffff !important; border-color: #10b981 !important; }
        .btn-success:hover { opacity: 0.85; }

        button, .btn-auth, .custom-file-upload {
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease !important;
        }
        button:hover, .btn-auth:hover, .custom-file-upload:hover {
            transform: translateY(-3px) scale(1.02) !important;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12) !important;
        }
        button:active, .btn-auth:active, .custom-file-upload:active {
            transform: translateY(-1px) scale(1.00) !important;
        }
        body {
            opacity: 0;
            animation: fadeInPage 0.4s ease forwards;
        }
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body.fade-out {
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        @view-transition {
            navigation: auto;
        }
    </style>
</head>
<body>

    <!-- 🌟 Custom Smooth Modal Popup -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-icon-container" class="modal-icon-wrapper success">
                <i data-lucide="check" style="width: 24px; height: 24px;"></i>
            </div>
            <div class="modal-title" id="modal-title-text">แจ้งเตือน</div>
            <div class="modal-desc" id="modal-desc-text">ข้อความแจ้งเตือน</div>
            <div class="modal-actions" id="modal-actions-container">
                <button id="modal-ok-btn" class="btn-success" style="width: 100%;">ตกลง</button>
            </div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo" style="text-decoration: none;">BodySlim</a>
        <div class="nav-links">
            <a href="index.html">BodySlim ?</a>
            <a href="home.html">หน้าหลัก</a>
            <a href="workout.html">ตารางออกกำลังกาย</a>
            <a href="profile.html">โปรไฟล์</a>
        </div>
        <div class="nav-actions">
            <button id="dark-mode-toggle" class="btn-auth btn-secondary"></button>
            <div id="auth-buttons" style="display: flex; gap: 8px; border-radius: 0;">
                <button class="btn-auth btn-secondary" onclick="window.location.href='login.html'">เข้าสู่ระบบ</button>
                <button class="btn-auth" onclick="window.location.href='register.html'">สมัครบัญชี</button>
            </div>
            <button id="hamburger-btn" class="hamburger-btn btn-auth"><i data-lucide="menu" style="width: 18px; height: 18px;"></i></button>
        </div>
        <div id="mobile-dropdown" class="mobile-dropdown">
            <a href="index.html"><i data-lucide="home" style="width: 16px; height: 16px;"></i> BodySlim ?</a>
            <a href="home.html"><i data-lucide="home" style="width: 16px; height: 16px;"></i> หน้าหลัก</a>
            <a href="workout.html"><i data-lucide="activity" style="width: 16px; height: 16px;"></i> ตารางออกกำลังกาย</a>
            <a href="profile.html"><i data-lucide="user" style="width: 16px; height: 16px;"></i> โปรไฟล์</a>
            <button id="mobile-dark-mode-btn"><i data-lucide="moon" style="width: 16px; height: 16px;"></i> โหมดสี</button>
        </div>
    </nav>

    <div class="page-container">
        <div class="auth-card">
            <h2>ยินดีต้อนรับกลับมา</h2>
            <p>เข้าสู่ระบบเพื่อใช้งานต่อเลย</p>
            
            <form>
                <div class="form-group">
                    <label for="username">อีเมล (Email)</label>
                    <input type="email" id="username" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
            </form>

            <div class="switch-auth">
                ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิกที่นี่</a>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDB1HwSk12QUqbewPWntX3Rkhh5zBiSgWs",
        authDomain: "bodyslims-9b3ba.firebaseapp.com",
        projectId: "bodyslims-9b3ba",
        storageBucket: "bodyslims-9b3ba.firebasestorage.app",
        messagingSenderId: "721305521887",
        appId: "1:721305521887:web:030ef02c5fa9264508a36a",
        measurementId: "G-NDQZJJVEVQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const hamburgerBtn = document.getElementById('hamburger-btn');
    const mobileDropdown = document.getElementById('mobile-dropdown');
    if (hamburgerBtn && mobileDropdown) {
        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileDropdown.style.display = mobileDropdown.style.display === 'flex' ? 'none' : 'flex';
        });
        document.addEventListener('click', () => {
            mobileDropdown.style.display = 'none';
        });
    }

    const toggleButton = document.querySelector('#dark-mode-toggle');
    const mobileToggleBtn = document.querySelector('#mobile-dark-mode-btn');
    const currentTheme = localStorage.getItem('theme') || 'light';

    function updateThemeUI(theme) {
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            if (toggleButton) toggleButton.innerHTML = '<i data-lucide="sun" style="width: 16px; height: 16px;"></i>';
            if (mobileToggleBtn) mobileToggleBtn.innerHTML = '<i data-lucide="sun" style="width: 16px; height: 16px;"></i> โหมดสว่าง';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            if (toggleButton) toggleButton.innerHTML = '<i data-lucide="moon" style="width: 16px; height: 16px;"></i>';
            if (mobileToggleBtn) mobileToggleBtn.innerHTML = '<i data-lucide="moon" style="width: 16px; height: 16px;"></i> โหมดมืด';
        }
        lucide.createIcons();
    }
    updateThemeUI(currentTheme);

    if (toggleButton) {
        toggleButton.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            updateThemeUI(theme === 'dark' ? 'light' : 'dark');
        });
    }

    if (mobileToggleBtn) {
        mobileToggleBtn.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            updateThemeUI(theme === 'dark' ? 'light' : 'dark');
        });
    }

    function showAlertModal(title, desc, type, onConfirm) {
        const modal = document.getElementById('custom-modal');
        const titleEl = document.getElementById('modal-title-text');
        const descEl = document.getElementById('modal-desc-text');
        const iconWrapper = document.getElementById('modal-icon-container');
        const actionsContainer = document.getElementById('modal-actions-container');

        titleEl.innerText = title;
        descEl.innerText = desc;
        modal.classList.add('active');

        if (type === 'success') {
            iconWrapper.className = 'modal-icon-wrapper success';
            iconWrapper.innerHTML = '<i data-lucide="check" style="width: 24px; height: 24px;"></i>';
            actionsContainer.innerHTML = `<button id="modal-ok-btn" class="btn-success" style="width: 100%;">ตกลง</button>`;
        } else {
            iconWrapper.className = 'modal-icon-wrapper';
            iconWrapper.innerHTML = '<i data-lucide="alert-triangle" style="width: 24px; height: 24px;"></i>';
            actionsContainer.innerHTML = `<button id="modal-ok-btn" class="btn-danger" style="width: 100%;">ตกลง</button>`;
        }

        document.getElementById('modal-ok-btn').addEventListener('click', () => {
            modal.classList.remove('active');
            if (onConfirm) onConfirm();
        }, { once: true });

        lucide.createIcons();
    }

    document.querySelector('form').addEventListener('submit', async (event) => {
        event.preventDefault();
        
        const email = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        try {
            await signInWithEmailAndPassword(auth, email, password);

            let sessionData = localStorage.getItem('user_session');
            let user = sessionData ? JSON.parse(sessionData) : { username: email.split('@')[0], email: email };
            user.isLoggedIn = true;
            localStorage.setItem('user_session', JSON.stringify(user)); 
            
            showAlertModal('สำเร็จ!', 'เข้าสู่ระบบสำเร็จ!', 'success', () => {
                window.location.href = 'home.html'; 
            });
        } catch (error) {
            showAlertModal('ข้อผิดพลาด', 'อีเมลหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง ❌', 'error');
        }
    });

    lucide.createIcons();

    document.addEventListener('DOMContentLoaded', () => {
        const internalLinks = document.querySelectorAll('a[href]');
        internalLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('http') && this.getAttribute('target') !== '_blank') {
                    e.preventDefault();
                    document.body.classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = href;
                    }, 300);
                }
            });
        });
    });
</script>
</body>
</html>
